<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Reporte de Inventario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-reporte">
        <h1>Reporte de Inventario</h1>
        
        <div class="filters">
            <input type="text" id="searchProduct" placeholder="Buscar producto...">
            <select id="filterCategory">
                <option value="">Todas las categorías</option>
                <option value="electronica">Electrónica</option>
                <option value="ropa">Ropa</option>
                <option value="alimentos">Alimentos</option>
                <option value="tecnologia">Tecnología</option>
            </select>
            <button onclick="generateReport()">Generar Reporte</button>
            <button onclick="printReport()">Imprimir</button>
        </div>

        <div id="loadingMessage" style="display:none; text-align:center; padding:20px;">
            Cargando datos...
        </div>

        <table id="reportTable" style="display:table-cell;">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
        
        <div id="summaryInfo" class="summaryInfo">
            <p><strong>Total productos:</strong> <span id="totalProducts">0</span></p>
            <p><strong>Inventario total ($):</strong> <span id="inventoryTotal">$0.00</span></p>
        </div>
    </div>

    
    <script src="nav-loader.js"></script>
</body>
</html>
