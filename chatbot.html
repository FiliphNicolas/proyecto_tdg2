<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Systemsware</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chatbot-container">
        <div class="chatbot-header">
            <h2>🤖 Chatbot Systemsware</h2>
            <p>Estoy aquí para ayudarte con tus preguntas</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div style="margin: auto;">
                <div class="welcome-message">
                    <h3>¡Hola! 👋</h3>
                    <p>Soy el asistente de Systemsware. ¿En qué puedo ayudarte?</p>
                    <div class="quick-replies">
                        <button class="quick-reply-btn" onclick="sendQuickReply('¿Qué servicios ofrecen?')">Servicios</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('¿Cuáles son los precios?')">Precios</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('¿Cómo contacto a soporte?')">Soporte</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('Información del inventario')">Inventario</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Escribe tu mensaje..." 
                onkeypress="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script src="nav-loader.js"></script>
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');

        // Base de conocimiento del chatbot
        const botResponses = {
            servicios: {
                keywords: ['servicios', 'qué ofrecen', 'están disponibles'],
                response: 'Ofrecemos los siguientes servicios:\n\n1. 🔧 Mantenimiento preventivo\n2. ⚙️ Reparación de equipos\n3. 💡 Consultoría técnica\n4. 📦 Instalación de sistemas\n\n¿Deseas más detalles sobre alguno?'
            },
            precios: {
                keywords: ['precio', 'costo', 'tarifa', 'cuánto cuesta', 'valor'],
                response: 'Nuestros precios varían según el servicio:\n\n• Mantenimiento: $50-200 por sesión\n• Reparación: $100-500 según el problema\n• Consultoría: $80 por hora\n• Instalación: A partir de $300\n\nContacta a soporte para presupuesto personalizado.'
            },
            soporte: {
                keywords: ['soporte', 'contacto', 'ayuda', 'problema', 'no funciona', 'reportar'],
                response: 'Para contactar a nuestro equipo de soporte:\n\n📧 Email: soporte@systemsware.com\n📞 Teléfono: +1 (555) 123-4567\n⏰ Horario: Lunes-Viernes 8AM-6PM\n💬 Chat en vivo disponible\n\n¿Cuál es tu problema específico?'
            },
            inventario: {
                keywords: ['inventario', 'productos', 'stock', 'disponible', 'hay en stock'],
                response: 'Puedo ayudarte a consultar el inventario. Para acceder a información detallada:\n\n1. Ve a la sección "Reportes"\n2. Selecciona "Generar Reporte"\n3. Busca el producto específico\n\n¿Qué producto buscas?'
            },
            saludo: {
                keywords: ['hola', 'buenos días', 'buenas noches', 'buenas tardes', 'hey', 'hi'],
                response: '¡Hola! 👋 Me alegra ayudarte. ¿Cuál es tu pregunta hoy?'
            },
            gracias: {
                keywords: ['gracias', 'muchas gracias', 'thank you', 'thanks'],
                response: '¡De nada! 😊 Estoy aquí para ayudarte. ¿Hay algo más que necesites?'
            },
            horario: {
                keywords: ['horario', 'abierto', 'cierra', 'atiende', 'disponible'],
                response: 'Nuestro horario de atención:\n\n📅 Lunes a Viernes: 8:00 AM - 6:00 PM\n📅 Sábados: 10:00 AM - 2:00 PM\n📅 Domingos: Cerrado\n\n¿Hay algo más que deba saber?'
            },
            ubicacion: {
                keywords: ['ubicación', 'dirección', 'dónde', 'calle', 'localización'],
                response: 'Nos encontramos en:\n\n📍 Systemsware Services\nCarrera 7 #45-23, Oficina 101\nCiudad Principal\n\nTambién ofrecemos servicio remoto y a domicilio.'
            }
        };

        function getRandomElement(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function findBotResponse(userMessage) {
            const lower = userMessage.toLowerCase();
            
            for (const [key, data] of Object.entries(botResponses)) {
                if (data.keywords.some(keyword => lower.includes(keyword))) {
                    return data.response;
                }
            }
            
            // Respuesta por defecto
            return 'No estoy completamente seguro de tu pregunta. Puedo ayudarte con:\n\n• Servicios disponibles\n• Precios y tarifas\n• Contacto de soporte\n• Información del inventario\n• Horarios de atención\n\n¿Con cuál de estos puedo ayudarte?';
        }

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            // Scroll automático al último mensaje
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typingIndicator';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content typing-indicator';
            contentDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Limpiar input y enfoque
            messageInput.value = '';
            messageInput.focus();

            // Mostrar mensaje del usuario
            addMessage(message, true);

            // Mostrar indicador de escritura
            showTypingIndicator();

            // Simular tiempo de respuesta (500-1000ms)
            setTimeout(() => {
                removeTypingIndicator();
                const response = findBotResponse(message);
                addMessage(response, false);
            }, 500 + Math.random() * 500);
        }

        function sendQuickReply(message) {
            messageInput.value = message;
            sendMessage();
        }

        // Focus en input al cargar
        window.addEventListener('DOMContentLoaded', () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
