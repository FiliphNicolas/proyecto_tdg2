<!DOCTYPE html>
<html lang="es" class="cuenta-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar tu cuenta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<style>

*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html{
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}
body{
  margin: 0;
  padding: 0;
  background: linear-gradient(140deg, #00218f, #285aff, #72AAFF);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center; 
}

</style>
<body>
  <div class="container-seccion">
    <div class="titulo">
      <h1>Systemsware</h1>
    </div>
    <form class="cuadro-azul" id="registroForm">
      <p class="subtitulo">Crear tu cuenta</p>
      <p class="descripcion">Registrar a tus datos.</p>
      <div class="barra">
        <label class="etiqueta" for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Introduce tu nombre">
        <span class="error" id="error-nombre"></span>
      </div>
      <div class="barra">
        <label class="etiqueta" for="direccion">Dirección</label>
        <input type="text" id="direccion" placeholder="Introduce la dirección">
        <span class="error" id="error-direccion"></span>
      </div>
      <div class="barra">
        <label class="etiqueta" for="numero_cel">Numero Celular</label>
        <input type="text" id="numero_cel" placeholder="Introduce tu numero celular">
        <span class="error" id="error-numero_cel"></span>
      </div>
      <div class="barra">
        <label class="etiqueta" for="ciudad">Ciudad</label>
        <input type="text" id="ciudad" placeholder="Introduce la ciudad">
        <span class="error" id="error-ciudad"></span>
      </div>
      <div class="barra">
        <label class="etiqueta" for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="Introduce tu correo">
        <span class="error" id="error-correo"></span>
      </div>
      <div class="barra">
        <label class="etiqueta" for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="Introduce tu contraseña">
        <span class="error" id="error-contrasena"></span>
      </div>
      <div class="barra">
        <label class="etiqueta" for="contrasena_nuevo">Contraseña de nuevo</label>
        <input type="password" id="contrasena_nuevo" placeholder="Introduce tu contraseña">
        <span class="error" id="error-contrasena_nuevo"></span>
      </div>
      <div id="errorConexion" class="error-conexion" style="display: none; background: #fee; border: 1px solid #f99; padding: 12px; border-radius: 8px; margin-top: 15px; color: #c00; font-size: 13px; white-space: pre-wrap; line-height: 1.6;"></div>
      <div class="boton-cuenta">
        <button type="submit">Registrar cuenta</button>
      </div>
      <p style="text-align: center; margin-top: 20px; color: white;">
        ¿Ya tienes cuenta? <a href="iniciar-sesion.html" class="olvidar" style="display: inline;">Inicia sesión aquí</a>
      </p>
    </form>
  </div>

<script>
function createErrorElement() {
  let errorDiv = document.getElementById('errorConexion');
  if (!errorDiv) {
    errorDiv = document.createElement('div');
    errorDiv.id = 'errorConexion';
    errorDiv.className = 'error-conexion';
    errorDiv.style.cssText = 'display: none; background: #fee; border: 1px solid #f99; padding: 12px; border-radius: 8px; margin-top: 15px; color: #c00; font-size: 13px; white-space: pre-wrap; line-height: 1.6;';
    document.querySelector('.cuadro-azul').insertBefore(errorDiv, document.querySelector('.boton-cuenta'));
  }
  return errorDiv;
}

function showError(element, mensaje) {
  element.textContent = mensaje;
  element.style.display = 'block';
  element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById("registroForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const nombre            = document.getElementById("nombre").value.trim();
  const correo            = document.getElementById("correo").value.trim();
  const direccion         = document.getElementById("direccion").value.trim();
  const numero_cel        = document.getElementById("numero_cel").value.trim();
  const ciudad            = document.getElementById("ciudad").value.trim();
  const contrasena        = document.getElementById("contrasena").value.trim();
  const contrasena_nuevo  = document.getElementById("contrasena_nuevo").value.trim();

  const errores = {
    nombre:                document.getElementById("error-nombre"),
    correo:                document.getElementById("error-correo"),
    direccion:             document.getElementById("error-direccion"),
    numero_cel:            document.getElementById("error-numero_cel"),
    ciudad:                document.getElementById("error-ciudad"),
    contrasena:            document.getElementById("error-contrasena"),
    contrasena_nuevo:      document.getElementById("error-contrasena_nuevo")
  };

  // Limpiar errores
  Object.values(errores).forEach(e => e.textContent = "");

  let valido = true;

  // Nombre
  if (nombre === "") {
    errores.nombre.textContent = "El nombre es obligatorio.";
    valido = false;
  } else if (nombre.length < 3) {
    errores.nombre.textContent = "Mínimo 3 caracteres.";
    valido = false;
  }

  // Correo
  const regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (correo === "") {
    errores.correo.textContent = "El correo es obligatorio.";
    valido = false;
  } else if (!regexCorreo.test(correo)) {
    errores.correo.textContent = "Correo no válido.";
    valido = false;
  }

  // Dirección
  if (direccion === "") {
    errores.direccion.textContent = "La dirección es obligatoria.";
    valido = false;
  }

  // Número celular
  const regexCel = /^\d{7,10}$/;
  if (numero_cel === "") {
    errores.numero_cel.textContent = "El número es obligatorio.";
    valido = false;
  } else if (!regexCel.test(numero_cel)) {
    errores.numero_cel.textContent = "Debe tener entre 7 y 10 dígitos.";
    valido = false;
  }

  // Ciudad
  const regexCP = /^[a-zA-Z\s]+$/;
  if (ciudad === "") {
    errores.ciudad.textContent = "La ciudad es obligatoria.";
    valido = false;
  } else if (!regexCP.test(ciudad)) {
    errores.ciudad.textContent = "Debe escribir una ciudad válida.";
    valido = false;
  }

  // Contraseña
  if (contrasena === "") {
    errores.contrasena.textContent = "La contraseña es obligatoria.";
    valido = false;
  } else if (contrasena.length < 6) {
    errores.contrasena.textContent = "Mínimo 6 caracteres.";
    valido = false;
  }

  // Confirmar contraseña
  if (contrasena_nuevo === "") {
    errores.contrasena_nuevo.textContent = "Debes repetir la contraseña.";
    valido = false;
  } else if (contrasena !== contrasena_nuevo) {
    errores.contrasena_nuevo.textContent = "Las contraseñas no coinciden.";
    valido = false;
  }

  if (valido) {
    // Enviar al servidor
    const submitButton = document.querySelector('.boton-cuenta button');
    submitButton.disabled = true;
    submitButton.textContent = 'Registrando...';
    const errorElement = document.querySelector('.error-conexion') || createErrorElement();

    fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, correo, contrasena }),
      timeout: 5000
    })
    .then(r => {
      if (!r.ok) throw new Error(`Servidor respondió con error: ${r.status}`);
      return r.json();
    })
    .then(data => {
      submitButton.disabled = false;
      submitButton.textContent = 'Registrar cuenta';
      errorElement.style.display = 'none';
      
      if (data.ok) {
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userName', data.user.nombre_usuario);
        alert('¡Registro exitoso! Bienvenido.');
        window.location.href = 'index.html';
      } else {
        showError(errorElement, data.error || 'Error al registrar la cuenta');
      }
    })
    .catch(err => {
      console.error('Error:', err);
      submitButton.disabled = false;
      submitButton.textContent = 'Registrar cuenta';
      
      let mensaje = 'Error de conexión';
      if (err.message.includes('Failed to fetch')) {
        mensaje = '❌ No se pudo conectar al servidor. Por favor:\n\n1. Abre una terminal\n2. Ejecuta: npm start\n3. Espera a que el servidor inicie en puerto 3000\n\nLuego intenta nuevamente.';
      } else if (err.message.includes('timeout')) {
        mensaje = '⏱️ El servidor tardó demasiado en responder. Intenta nuevamente.';
      } else {
        mensaje = 'Error de red: ' + err.message;
      }
      showError(errorElement, mensaje);
    });
  }
});

</script>
</body>
</html>
