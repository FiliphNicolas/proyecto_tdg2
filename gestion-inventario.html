<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario - Systemsware</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --light: #f8f9fa;
            --dark: #343a40;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header { text-align: center; border-bottom: 3px solid var(--light); margin-bottom: 25px; padding-bottom: 20px; }
        .header h1 { color: var(--secondary); margin-bottom: 5px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { font-size: 14px; font-weight: 600; color: var(--dark); }
        .form-group input, .form-group select, .form-group textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .btn { border: none; padding: 12px 24px; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn:hover { opacity: 0.9; }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        .alert { padding: 12px; border-radius: 6px; margin-bottom: 15px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

        .product-info { background: var(--light); padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .product-info h3 { margin: 0 0 10px 0; color: var(--secondary); }
        .product-info p { margin: 5px 0; font-size: 14px; }

        .recent-movements { margin-top: 30px; }
        .movement-item { background: var(--light); padding: 10px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .movement-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .entrada { background: #d4edda; color: #155724; }
        .salida { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Gestión de Inventario</h1>
            <p>Agregar y gestionar movimientos de inventario</p>
        </div>

        <div id="alertContainer"></div>

        <form id="movementForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="productCode">Código del Producto *</label>
                    <select id="productCode" required>
                        <option value="">Seleccionar producto...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="movementType">Tipo de Movimiento *</label>
                    <select id="movementType" required>
                        <option value="">Seleccionar tipo...</option>
                        <option value="entrada">Entrada</option>
                        <option value="salida">Salida</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity">Cantidad *</label>
                    <input type="number" id="quantity" min="1" required placeholder="Ej: 10">
                </div>

                <div class="form-group">
                    <label for="currentStock">Stock Actual</label>
                    <input type="text" id="currentStock" readonly placeholder="Cargando...">
                </div>

                <div class="form-group full-width">
                    <label for="description">Descripción</label>
                    <textarea id="description" placeholder="Motivo del movimiento (opcional)"></textarea>
                </div>
            </div>

            <div class="product-info" id="productInfo" style="display: none;">
                <h3>Información del Producto</h3>
                <p><strong>Nombre:</strong> <span id="productName"></span></p>
                <p><strong>Categoría:</strong> <span id="productCategory"></span></p>
                <p><strong>Precio:</strong> $<span id="productPrice"></span></p>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">💾 Guardar Movimiento</button>
                <button type="button" class="btn btn-success" onclick="window.location.href='reporte-inventario.html'">📊 Ver Reporte</button>
                <button type="reset" class="btn btn-danger">🔄 Limpiar Formulario</button>
            </div>
        </form>

        <div class="recent-movements">
            <h3>📋 Movimientos Recientes</h3>
            <div id="recentMovements"></div>
        </div>
    </div>

    <script>
        let products = [];
        let currentProduct = null;

        // Cargar productos
        async function loadProducts() {
            try {
                const response = await fetch('/api/public/productos');
                const data = await response.json();
                
                if (data.ok) {
                    products = data.products;
                    populateProductSelect();
                }
            } catch (error) {
                console.error('Error cargando productos:', error);
            }
        }

        function populateProductSelect() {
            const select = document.getElementById('productCode');
            select.innerHTML = '<option value="">Seleccionar producto...</option>';
            
            products.forEach(product => {
                const option = document.createElement('option');
                option.value = product.codigo_producto;
                option.textContent = `${product.codigo_producto} - ${product.nombre}`;
                select.appendChild(option);
            });
        }

        // Actualizar información del producto seleccionado
        document.getElementById('productCode').addEventListener('change', async function() {
            const code = this.value;
            if (!code) {
                document.getElementById('productInfo').style.display = 'none';
                document.getElementById('currentStock').value = '';
                currentProduct = null;
                return;
            }

            currentProduct = products.find(p => p.codigo_producto === code);
            if (currentProduct) {
                document.getElementById('productName').textContent = currentProduct.nombre;
                document.getElementById('productCategory').textContent = currentProduct.categoria || 'Sin categoría';
                document.getElementById('productPrice').textContent = parseFloat(currentProduct.precio).toFixed(2);
                document.getElementById('currentStock').value = currentProduct.cantidad_stock;
                document.getElementById('productInfo').style.display = 'block';
            }
        });

        // Enviar formulario
        document.getElementById('movementForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                codigo_producto: document.getElementById('productCode').value,
                tipo_movimiento: document.getElementById('movementType').value,
                cantidad: parseInt(document.getElementById('quantity').value),
                descripcion: document.getElementById('description').value
            };

            try {
                const response = await fetch('/api/public/inventario', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                
                if (data.ok) {
                    showAlert('✅ Movimiento agregado correctamente!', 'success');
                    this.reset();
                    document.getElementById('productInfo').style.display = 'none';
                    loadRecentMovements();
                    
                    // Actualizar stock del producto actual
                    if (currentProduct) {
                        const stockChange = formData.tipo_movimiento === 'entrada' ? formData.cantidad : -formData.cantidad;
                        currentProduct.cantidad_stock += stockChange;
                        document.getElementById('currentStock').value = currentProduct.cantidad_stock;
                    }
                } else {
                    showAlert(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Error de conexión: ${error.message}`, 'error');
            }
        });

        // Cargar movimientos recientes
        async function loadRecentMovements() {
            try {
                const response = await fetch('/api/public/inventario');
                const data = await response.json();
                
                if (data.ok) {
                    const container = document.getElementById('recentMovements');
                    container.innerHTML = '';
                    
                    data.movements.slice(0, 5).forEach(movement => {
                        const div = document.createElement('div');
                        div.className = 'movement-item';
                        div.innerHTML = `
                            <div>
                                <strong>${movement.codigo_producto}</strong> - ${movement.nombre_producto}
                                <br><small>${movement.descripcion || 'Sin descripción'}</small>
                            </div>
                            <div style="text-align: right;">
                                <span class="movement-badge ${movement.tipo_movimiento}">${movement.tipo_movimiento}</span>
                                <br><strong>${movement.cantidad} unidades</strong>
                                <br><small>${new Date(movement.fecha_movimiento).toLocaleDateString()}</small>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('Error cargando movimientos:', error);
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            container.appendChild(alert);
            
            setTimeout(() => alert.remove(), 5000);
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            loadRecentMovements();
        });
    </script>
    <script src="nav-loader.js"></script>
</body>
</html>
