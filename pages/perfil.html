<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil - Systemsware</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- AuthService para autenticación -->
    <script src="../javascript/auth-service.js"></script>
    <!-- AuthGuard para proteger página -->
    <script src="../javascript/auth-guard.js"></script>
    <style>
        .perfil-photo {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .avatar-placeholder {
            display: block !important;
            visibility: visible !important;
        }
        
        .user-name {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .carta-perfil {
            display: inline-block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .contenedor-perfil {
            display: flex !important;
            visibility: visible !important;
            flex-direction: column;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="titulo-perfil">Mi perfil</h1>
        <div class="perfil-flex">            <div class="perfil">
                <div class="avatar-ring">
                    <div class="avatar-placeholder">
                        <img id="perfilFoto" src="imagenes/perfil-default.png" alt="Foto de perfil" class="perfil-photo">
                    </div>
                </div>
                <div class="user-name" id="perfilNombrePerfil">Usuario</div>
            </div>            <div class="contenedor-perfil">
                <button class="carta-perfil" onclick="window.location.href='ver-usuario-actual.html'" title="Ver y editar informaciÃ³n personal">
                 Ver estado de usuario
                </button>
                <button class="carta-perfil cerrar-seccion" onclick="cerrarSesion()">
                     Cerrar sesión
                </button>
            </div>
        </div>
    </div>

    <script src="../javascript/nav-loader.js"></script>
    <script>
        async function cerrarSesion() {
            if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                try {
                    const token = localStorage.getItem('authToken');
                    
                    // Llamar al endpoint de logout del servidor
                    if (token) {
                        const response = await fetch('/api/auth/logout', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        if (response.ok) {
                            console.log('Sesión cerrada exitosamente en el servidor');
                        } else {
                            console.log('Error al cerrar sesión en servidor, pero continuando con logout local');
                        }
                    }
                    
                    // Limpiar localStorage/sessionStorage
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userName');
                    localStorage.removeItem('userToken');
                    localStorage.removeItem('userInfo');
                    localStorage.removeItem('loginTime');
                    sessionStorage.clear();
                    
                    // Actualizar navbar antes de redirigir
                    if (typeof updateNavState === 'function') {
                        updateNavState();
                    }
                    
                    // Redirigir a login
                    window.location.href = 'iniciar-sesion.html';
                } catch (error) {
                    console.error('Error durante logout:', error);
                    
                    // Aun si hay error, limpiar datos locales y redirigir
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userName');
                    localStorage.removeItem('userToken');
                    localStorage.removeItem('userInfo');
                    localStorage.removeItem('loginTime');
                    sessionStorage.clear();
                    
                    // Actualizar navbar antes de redirigir
                    if (typeof updateNavState === 'function') {
                        updateNavState();
                    }
                    
                    window.location.href = 'iniciar-sesion.html';
                }
            }
        }

        async function eliminarCuenta() {
            try {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    alert('No tienes sesión activa');
                    window.location.href = 'iniciar-sesion.html';
                    return;
                }

                const response = await fetch('/api/me', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    alert('✅ Tu cuenta ha sido eliminada permanentemente.\n\nSerás redirigido a la página principal.');
                    
                    // Limpiar datos locales
                    localStorage.clear();
                    sessionStorage.clear();
                    
                    // Redirigir a página principal
                    window.location.href = 'index.html';
                } else {
                    const error = await response.json();
                    alert('❌ Error al eliminar la cuenta: ' + (error.error || 'Error desconocido'));
                }
            } catch (error) {
                console.error('Error al eliminar cuenta:', error);
                alert('❌ Error de conexión al eliminar la cuenta. Por favor intenta nuevamente.');
            }
        }

        // Verificar si el usuario está logueado
        document.addEventListener('DOMContentLoaded', function() {
            const userToken = localStorage.getItem('authToken') || localStorage.getItem('userToken');
            if (!userToken) {
                alert('Debes iniciar sesión para acceder a tu perfil');
                window.location.href = 'iniciar-sesion.html';
                return;
            }

            // Cargar la navegación
            if (typeof loadNavigation === 'function') {
                loadNavigation();
            }

            const profileName = document.getElementById('perfilNombrePerfil');
            const avatarImg = document.getElementById('perfilFoto');
            const userName = localStorage.getItem('userName');
            const userAvatarUrl = localStorage.getItem('userAvatarUrl');

            if (profileName) {
                profileName.textContent = userName || 'Usuario';
            }
            if (avatarImg && userAvatarUrl) {
                avatarImg.src = userAvatarUrl;
                avatarImg.style.display = 'block';
                avatarImg.style.visibility = 'visible';
            } else if (avatarImg) {
                // Asegurar que la imagen por defecto sea visible
                avatarImg.style.display = 'block';
                avatarImg.style.visibility = 'visible';
            }
        });
    </script>
</body>
</html>
