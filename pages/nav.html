<!-- Componente de navegación reutilizable -->
<nav>
  <div class="barra-menu">
    <h1>Systemsware</h1>
    <a href="perfil.html" class="perfil-nav" id="perfilNav" style="display: none; text-decoration: none; color: inherit;">
      <img src="imagenes/perfil-default.png" alt="Perfil" class="perfil-avatar" id="perfilAvatar">
      <span class="perfil-nombre" id="perfilNombre">Usuario</span>
    </a>
    <span id="userGreeting" style="margin-left: auto; color: white; font-size: 14px; display: none;"></span>
  </div>
  <div class="nav-link">
    <a href="inicio.html" id="nav-inicio">Inicio</a>
    <a href="servicio.html" id="nav-servicios">Servicios</a>
    <a href="productos.html" id="nav-productos">Productos</a>
    <a href="pedidos-crud.html" id="nav-pedidos-crud">Pedidos CRUD</a>
    <a href="reporte-inventario.html" id="nav-inventario">Reporte Inventario</a>
    <a href="conexion-auditoria.html" id="nav-auditoria">Auditoría</a>
  </div>
</nav>

<script>
// Verificar autenticación y mostrar/ocultar elementos
function setupNav() {
  const token = localStorage.getItem('authToken');
  const userName = localStorage.getItem('userName');
  const userGreeting = document.getElementById('userGreeting');
  const perfilNav = document.getElementById('perfilNav');
  const perfilNombre = document.getElementById('perfilNombre');
  
  if (token) {
    // Mostrar perfil junto al título
    if (perfilNav) {
      perfilNav.style.display = 'flex';
      if (perfilNombre) {
        perfilNombre.textContent = userName || 'Usuario';
      }
    }
  }
}

// Marcar link activo según la página actual
function highlightNavLink() {
  const currentPage = window.location.pathname.split('/').pop() || 'inicio.html';
  const links = {
    'inicio.html': 'nav-inicio',
    'servicio.html': 'nav-servicios',
    'productos.html': 'nav-productos',
    'pedidos-crud.html': 'nav-pedidos-crud',
    'reporte-inventario.html': 'nav-inventario',
    'conexion-auditoria.html': 'nav-auditoria',
    'informacion-personal.html': 'perfilNav',
    'editar-informacion-personal.html': 'perfilNav',
    'ver-estado-cuenta.html': 'perfilNav',
  };
  const navId = links[currentPage];
  if (navId) {
    const element = document.getElementById(navId);
    if (element) element.classList.add('seleccionado');
  }
}

// Ejecutar cuando el nav está listo
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    setupNav();
    highlightNavLink();
  });
} else {
  setupNav();
  highlightNavLink();
}
</script>
