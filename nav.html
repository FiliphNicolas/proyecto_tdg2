<!-- Componente de navegación reutilizable -->
<nav>
  <div class="barra-menu">
    <h1>Systemsware</h1>
    <div class="perfil-nav" id="perfilNav" style="display: none;">
      <img src="perfil-default.png" alt="Perfil" class="perfil-avatar" id="perfilAvatar">
      <span class="perfil-nombre" id="perfilNombre">Usuario</span>
    </div>
    <span id="userGreeting" style="margin-left: auto; color: white; font-size: 14px; display: none;"></span>
  </div>
  <div class="nav-link">
    <a href="index.html" id="nav-inicio">Inicio</a>
    <a href="servicio.html" id="nav-servicios">Servicios</a>
    <a href="productos.html" id="nav-productos">Productos</a>
    <a href="chatbot.html" id="nav-chatbot">Chatbot</a>
    <a href="reporte-inventario.html" id="nav-inventario">Inventario</a>
    <a href="perfil.html" id="nav-perfil">Mi perfil</a>
    <a href="#" id="nav-logout" onclick="handleLogout(event)" style="display: none; color: #ff6b6b;">Cerrar sesión</a>
  </div>
</nav>

<script>
// Verificar autenticación y mostrar/ocultar elementos
function setupNav() {
  const token = localStorage.getItem('authToken');
  const userName = localStorage.getItem('userName');
  const userGreeting = document.getElementById('userGreeting');
  const logoutBtn = document.getElementById('nav-logout');
  const perfilNav = document.getElementById('perfilNav');
  const perfilNombre = document.getElementById('perfilNombre');
  
  if (token) {
    // Usuario autenticado
    if (userGreeting) {
      userGreeting.textContent = '👤 ' + (userName || 'Usuario');
      userGreeting.style.display = 'block';
    }
    if (logoutBtn) logoutBtn.style.display = 'block';
    
    // Mostrar perfil junto al título
    if (perfilNav) {
      perfilNav.style.display = 'flex';
      if (perfilNombre) {
        perfilNombre.textContent = userName || 'Usuario';
      }
    }
  }
}

function handleLogout(event) {
  event.preventDefault();
  if (confirm('¿Deseas cerrar sesión?')) {
    localStorage.removeItem('authToken');
    localStorage.removeItem('userName');
    window.location.href = 'iniciar-sesion.html';
  }
}

// Marcar link activo según la página actual
function highlightNavLink() {
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  const links = {
    'index.html': 'nav-inicio',
    'servicio.html': 'nav-servicios',
    'productos.html': 'nav-productos',
    'chatbot.html': 'nav-chatbot',
    'reporte-inventario.html': 'nav-inventario',
    'nuevo-chat.html': 'nav-chatbot',
    'perfil.html': 'nav-perfil',
    'informacion-personal.html': 'nav-perfil',
    'editar-informacion-personal.html': 'nav-perfil',
    'ver-estado-cuenta.html': 'nav-perfil',
  };
  const navId = links[currentPage];
  if (navId) {
    const element = document.getElementById(navId);
    if (element) element.classList.add('seleccionado');
  }
}

// Ejecutar cuando el nav está listo
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    setupNav();
    highlightNavLink();
  });
} else {
  setupNav();
  highlightNavLink();
}
</script>
