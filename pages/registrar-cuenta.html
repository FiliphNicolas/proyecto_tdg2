<!DOCTYPE html>
<html lang="es" class="cuenta-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Systemsware</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="container-seccion">
    <div class="titulo">
      <h1>Systemsware: Sistema de gestiÃ³n de inventario</h1>
    </div>
    <form class="cuadro-azul" id="registroForm">
      <div class="login-header">
        <h2 class="subtitulo">Crear tu cuenta</h2>
        <p class="descripcion">Completa tus datos para unirte a Systemsware</p>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="nombre">ðŸ‘¤ Nombre completo</label>
        <input type="text" id="nombre" placeholder="Juan PÃ©rez" required autocomplete="name">
        <span class="error" id="error-nombre"></span>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="direccion">ðŸ  DirecciÃ³n</label>
        <input type="text" id="direccion" placeholder="Calle Principal #123" required autocomplete="street-address">
        <span class="error" id="error-direccion"></span>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="numero_cel">ðŸ“± NÃºmero de celular</label>
        <input type="tel" id="numero_cel" placeholder="3001234567" required autocomplete="tel">
        <span class="error" id="error-numero_cel"></span>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="ciudad">ðŸ™ï¸ Ciudad</label>
        <input type="text" id="ciudad" placeholder="BogotÃ¡" required autocomplete="address-level2">
        <span class="error" id="error-ciudad"></span>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="correo">ðŸ“§ Correo electrÃ³nico</label>
        <input type="email" id="correo" placeholder="correo@ejemplo.com" required autocomplete="email">
        <span class="error" id="error-correo"></span>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="contrasena">ðŸ”’ ContraseÃ±a</label>
        <div class="password-input-container">
          <input type="password" id="contrasena" placeholder="Crea una contraseÃ±a segura" required autocomplete="new-password">
          <button type="button" class="password-toggle" onclick="togglePassword('contrasena')">
            <span id="eyeIcon1">ðŸ‘ï¸</span>
          </button>
        </div>
        <span class="error" id="error-contrasena"></span>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="contrasena_nuevo">ðŸ”’ Confirmar contraseÃ±a</label>
        <div class="password-input-container">
          <input type="password" id="contrasena_nuevo" placeholder="Repite tu contraseÃ±a" required autocomplete="new-password">
          <button type="button" class="password-toggle" onclick="togglePassword('contrasena_nuevo')">
            <span id="eyeIcon2">ðŸ‘ï¸</span>
          </button>
        </div>
        <span class="error" id="error-contrasena_nuevo"></span>
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="acceptTerms">
          <span class="checkmark"></span>
          Acepto los tÃ©rminos y condiciones
        </label>
      </div>
      
      <div id="errorConexion" class="error-conexion" style="display: none;"></div>
      
      <div class="boton-cuenta">
        <button type="submit" id="registerButton">
          <span class="button-text">Crear cuenta</span>
          <span class="button-loader" style="display: none;">â³</span>
        </button>
      </div>
      
      <div class="register-link">
        <p>Â¿Ya tienes cuenta? <a href="iniciar-sesion.html" class="olvidar">Inicia sesiÃ³n</a></p>
      </div>
    </form>
  </div>

<script>
function togglePassword(fieldId) {
  const passwordInput = document.getElementById(fieldId);
  const eyeIcon = document.getElementById(fieldId === 'contrasena' ? 'eyeIcon1' : 'eyeIcon2');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.textContent = 'ðŸ™ˆ';
  } else {
    passwordInput.type = 'password';
    eyeIcon.textContent = 'ðŸ‘ï¸';
  }
}

function createErrorElement() {
  let errorDiv = document.getElementById('errorConexion');
  if (!errorDiv) {
    errorDiv = document.createElement('div');
    errorDiv.id = 'errorConexion';
    errorDiv.className = 'error-conexion';
    errorDiv.style.cssText = 'display: none; background: #fee; border: 1px solid #f99; padding: 12px; border-radius: 8px; margin-top: 15px; color: #c00; font-size: 13px; white-space: pre-wrap; line-height: 1.6;';
    document.querySelector('.cuadro-azul').insertBefore(errorDiv, document.querySelector('.boton-cuenta'));
  }
  return errorDiv;
}

function showError(element, mensaje) {
  element.textContent = mensaje;
  element.style.display = 'block';
  element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLoading(loading) {
  const button = document.getElementById('registerButton');
  const buttonText = button.querySelector('.button-text');
  const buttonLoader = button.querySelector('.button-loader');
  
  if (loading) {
    button.disabled = true;
    buttonText.style.display = 'none';
    buttonLoader.style.display = 'inline';
  } else {
    button.disabled = false;
    buttonText.style.display = 'inline';
    buttonLoader.style.display = 'none';
  }
}

document.getElementById("registroForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const nombre            = document.getElementById("nombre").value.trim();
  const correo            = document.getElementById("correo").value.trim();
  const direccion         = document.getElementById("direccion").value.trim();
  const numero_cel        = document.getElementById("numero_cel").value.trim();
  const ciudad            = document.getElementById("ciudad").value.trim();
  const contrasena        = document.getElementById("contrasena").value.trim();
  const contrasena_nuevo  = document.getElementById("contrasena_nuevo").value.trim();
  const acceptTerms       = document.getElementById('acceptTerms').checked;

  const errores = {
    nombre:                document.getElementById("error-nombre"),
    correo:                document.getElementById("error-correo"),
    direccion:             document.getElementById("error-direccion"),
    numero_cel:            document.getElementById("error-numero_cel"),
    ciudad:                document.getElementById("error-ciudad"),
    contrasena:            document.getElementById("error-contrasena"),
    contrasena_nuevo:      document.getElementById("error-contrasena_nuevo")
  };

  // Limpiar errores
  Object.values(errores).forEach(e => e.textContent = "");

  let valido = true;

  // Validar tÃ©rminos y condiciones
  if (!acceptTerms) {
    showError(document.getElementById('errorConexion'), 'âŒ Debes aceptar los tÃ©rminos y condiciones para continuar.');
    valido = false;
  }

  // Nombre
  if (nombre === "") {
    errores.nombre.textContent = "El nombre es obligatorio.";
    valido = false;
  } else if (nombre.length < 3) {
    errores.nombre.textContent = "El nombre debe tener al menos 3 caracteres.";
    valido = false;
  } else if (!/^[a-zA-Z\s]+$/.test(nombre)) {
    errores.nombre.textContent = "El nombre solo puede contener letras y espacios.";
    valido = false;
  }

  // Correo
  const regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (correo === "") {
    errores.correo.textContent = "El correo es obligatorio.";
    valido = false;
  } else if (!regexCorreo.test(correo)) {
    errores.correo.textContent = "Por favor, ingresa un correo vÃ¡lido.";
    valido = false;
  }

  // DirecciÃ³n
  if (direccion === "") {
    errores.direccion.textContent = "La direcciÃ³n es obligatoria.";
    valido = false;
  } else if (direccion.length < 5) {
    errores.direccion.textContent = "La direcciÃ³n debe tener al menos 5 caracteres.";
    valido = false;
  }

  // NÃºmero celular
  const regexCel = /^\d{7,10}$/;
  if (numero_cel === "") {
    errores.numero_cel.textContent = "El nÃºmero es obligatorio.";
    valido = false;
  } else if (!regexCel.test(numero_cel)) {
    errores.numero_cel.textContent = "Debe tener entre 7 y 10 dÃ­gitos.";
    valido = false;
  }

  // Ciudad
  if (ciudad === "") {
    errores.ciudad.textContent = "La ciudad es obligatoria.";
    valido = false;
  } else if (!/^[a-zA-Z\s]+$/.test(ciudad)) {
    errores.ciudad.textContent = "La ciudad solo puede contener letras y espacios.";
    valido = false;
  }

  // ContraseÃ±a
  if (contrasena === "") {
    errores.contrasena.textContent = "La contraseÃ±a es obligatoria.";
    valido = false;
  } else if (contrasena.length < 6) {
    errores.contrasena.textContent = "La contraseÃ±a debe tener al menos 6 caracteres.";
    valido = false;
  } else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(contrasena)) {
    errores.contrasena.textContent = "La contraseÃ±a debe incluir mayÃºsculas, minÃºsculas y nÃºmeros.";
    valido = false;
  }

  // Confirmar contraseÃ±a
  if (contrasena_nuevo === "") {
    errores.contrasena_nuevo.textContent = "Debes repetir la contraseÃ±a.";
    valido = false;
  } else if (contrasena !== contrasena_nuevo) {
    errores.contrasena_nuevo.textContent = "Las contraseÃ±as no coinciden.";
    valido = false;
  }

  if (valido) {
    setLoading(true);
    const errorElement = document.getElementById('errorConexion');

    fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        nombre, 
        correo, 
        contrasena, 
        direccion, 
        numero_cel, 
        ciudad 
      }),
      timeout: 5000
    })
    .then(r => {
      if (!r.ok) throw new Error(`Servidor respondiÃ³ con error: ${r.status}`);
      return r.json();
    })
    .then(data => {
      setLoading(false);
      errorElement.style.display = 'none';
      
      if (data.ok) {
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userName', data.user.nombre_usuario);
        
        // Mostrar mensaje de Ã©xito
        const successDiv = document.createElement('div');
        successDiv.className = 'success-message';
        successDiv.textContent = 'âœ… Â¡Cuenta creada exitosamente! Redirigiendo...';
        successDiv.style.cssText = 'background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center;';
        document.querySelector('.cuadro-azul').insertBefore(successDiv, document.querySelector('.boton-cuenta'));
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      } else {
        showError(errorElement, data.error || 'âŒ Error al registrar la cuenta');
      }
    })
    .catch(err => {
      console.error('Error:', err);
      setLoading(false);
      
      let mensaje = 'âŒ Error de conexiÃ³n';
      if (err.message.includes('Failed to fetch')) {
        mensaje = 'âŒ No se pudo conectar al servidor. Por favor:\n\n1. Abre una terminal\n2. Ejecuta: npm start\n3. Espera a que el servidor inicie en puerto 3000\n\nLuego intenta nuevamente.';
      } else if (err.message.includes('timeout')) {
        mensaje = 'â±ï¸ El servidor tardÃ³ demasiado en responder. Intenta nuevamente.';
      } else {
        mensaje = 'Error de red: ' + err.message;
      }
      showError(errorElement, mensaje);
    });
  }
});

// Auto-focus en el campo nombre al cargar
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('nombre').focus();
});
</script>
</body>
</html>
