<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InformaciÃ³n Personal</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- AuthService para autenticación -->
    <script src="../javascript/auth-service.js"></script>
    <!-- AuthGuard para proteger página -->
    <script src="../javascript/auth-guard.js"></script>
</head>
<body>

  <main>
    <div class="profile-card">

      <div class="card-header">
        <div class="avatar-ring">
          <div class="avatar-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
          </div>
        </div>
        <div class="user-name" id="display-name">Usuario</div>
        <div class="user-email" id="display-email">correo@ejemplo.com</div>
        <div class="user-sede" id="display-sede" style="font-size: 12px; color: #666; margin-top: 8px;">Sede: <strong id="sede-name">Sede Principal</strong></div>
      </div>

      <div class="card-body">
        <div class="section-label">Editar información</div>
        <form id="updateProfileForm" class="info-list">
          <!-- FORMULARIO DE DOS COLUMNAS -->
          <div class="form-columns-container info-columns">
            <!-- COLUMNA IZQUIERDA -->
            <div class="form-column">
              <div class="info-row">
                <label class="info-label" for="nombre">Nombre completo</label>
                <input class="info-value" id="nombre" type="text" placeholder="Tu nombre" required />
              </div>
              
              <div class="info-row">
                <label class="info-label" for="numero_cel">Teléfono</label>
                <input class="info-value" id="numero_cel" type="tel" placeholder="3001234567" />
              </div>
              
              <div class="info-row">
                <label class="info-label" for="ciudad">Ciudad</label>
                <input class="info-value" id="ciudad" type="text" placeholder="Bogotá" />
              </div>
            </div>
            
            <!-- COLUMNA DERECHA -->
            <div class="form-column">
              <div class="info-row">
                <label class="info-label" for="correo">Correo electrónico</label>
                <input class="info-value" id="correo" type="email" placeholder="correo@ejemplo.com" required />
              </div>
              
              <div class="info-row">
                <label class="info-label" for="direccion">Dirección</label>
                <input class="info-value" id="direccion" type="text" placeholder="Calle Principal #123" />
              </div>
            </div>
          </div>
          
          <!-- BOTONES FULL WIDTH -->
          <div class="form-columns-container" style="margin-top: 20px;">
            <div class="form-full-width">
              <div class="info-row">
                <button type="submit">Guardar cambios</button>
              </div>
              <div id="update-profile-msg" style="color:green;margin-top:8px"></div>
            </div>
          </div>
        </form>

        <hr style="margin:18px 0;">

        <div class="section-label">Cambiar contraseña</div>
        <form id="updatePasswordForm" class="info-list">
          <div class="form-columns-container info-columns">
            <div class="form-full-width">
              <div class="info-row">
                <label class="info-label" for="contrasena_actual">Contraseña actual</label>
                <input class="info-value" id="contrasena_actual" type="password" placeholder="Tu contraseña actual" required />
              </div>
              
              <div class="info-row">
                <label class="info-label" for="contrasena_nueva">Nueva contraseña</label>
                <input class="info-value" id="contrasena_nueva" type="password" placeholder="Al menos 8 caracteres" required />
              </div>
              
              <div class="info-row">
                <label class="info-label" for="contrasena_confirm">Repetir nueva contraseña</label>
                <input class="info-value" id="contrasena_confirm" type="password" placeholder="Repite tu nueva contraseña" required />
              </div>
            </div>
          </div>
          
          <div class="form-columns-container" style="margin-top: 20px;">
            <div class="form-full-width">
              <div class="info-row">
                <button type="submit">Cambiar contraseña</button>
              </div>
              <div id="update-password-msg" style="color:green;margin-top:8px"></div>
            </div>
          </div>
        </form>
      </div>

    </div>
  </main>
<script>
async function apiFetch(path, opts={}){
  const token = localStorage.getItem('token');
  const headers = opts.headers || {};
  headers['Content-Type'] = headers['Content-Type'] || 'application/json';
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(path, Object.assign({}, opts, { headers }));
  return res;
}

async function loadProfile(){
  try{
    const res = await apiFetch('/api/me', { method: 'GET' });
    if (!res.ok) throw new Error('No autorizado');
    const data = await res.json();
    const user = data.user;
    
    // Mostrar en encabezado
    document.getElementById('display-name').textContent = user.nombre_usuario || 'Usuario';
    document.getElementById('display-email').textContent = user.email || '';
    
    // Mostrar sede si existe
    if (user.id_sede) {
      document.getElementById('sede-name').textContent = `Sede (ID: ${user.id_sede})`;
    }
    
    // Cargar todos los campos en el formulario
    document.getElementById('nombre').value = user.nombre_usuario || '';
    document.getElementById('correo').value = user.email || '';
    document.getElementById('numero_cel').value = user.numero_cel || '';
    document.getElementById('direccion').value = user.direccion || '';
    document.getElementById('ciudad').value = user.ciudad || '';
  }catch(err){
    console.error(err);
    document.getElementById('update-profile-msg').textContent = 'Debe iniciar sesión para editar.';
  }
}

document.getElementById('updateProfileForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const nombre = document.getElementById('nombre').value.trim();
  const correo = document.getElementById('correo').value.trim();
  const numero_cel = document.getElementById('numero_cel').value.trim();
  const direccion = document.getElementById('direccion').value.trim();
  const ciudad = document.getElementById('ciudad').value.trim();
  
  const msg = document.getElementById('update-profile-msg');
  msg.style.color = 'red';
  msg.textContent = '';

  // Validación básica
  if (!nombre || !correo) {
    msg.textContent = 'Nombre y correo son requeridos.';
    return;
  }
  
  if (!correo.includes('@')) {
    msg.textContent = 'Correo inválido.';
    return;
  }

  try {
    const body = {
      nombre_usuario: nombre,
      email: correo,
      numero_cel: numero_cel || null,
      direccion: direccion || null,
      ciudad: ciudad || null
    };

    const res = await apiFetch('/api/me', { 
      method: 'PUT', 
      body: JSON.stringify(body) 
    });
    
    let data;
    try { 
      data = await res.json(); 
    } catch (e) { 
      data = {}; 
    }
    
    if (!res.ok) {
      msg.textContent = data.error || 'Error al actualizar';
      return;
    }
    
    msg.style.color = 'green';
    msg.textContent = 'Perfil actualizado correctamente.';
    
    // Actualizar vista
    if (data.user) {
      document.getElementById('display-name').textContent = data.user.nombre_usuario || nombre;
      document.getElementById('display-email').textContent = data.user.email || correo;
    }
  } catch (err) {
    console.error(err);
    msg.textContent = 'Error de red: ' + err.message;
  }
});

document.getElementById('updatePasswordForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const current = document.getElementById('contrasena_actual').value;
  const nueva = document.getElementById('contrasena_nueva').value;
  const confirm = document.getElementById('contrasena_confirm').value;
  const msg = document.getElementById('update-password-msg');
  msg.style.color = 'red';
  msg.textContent = '';

  if (!current) { 
    msg.textContent = 'Ingrese su contraseña actual.'; 
    return; 
  }
  
  if (nueva.length < 8) { 
    msg.textContent = 'La nueva contraseña debe tener al menos 8 caracteres.'; 
    return; 
  }
  
  if (nueva !== confirm) { 
    msg.textContent = 'Las nuevas contraseñas no coinciden.'; 
    return; 
  }

  try {
    const body = { 
      contrasena_actual: current, 
      contrasena_nueva: nueva 
    };
    
    const res = await apiFetch('/api/me/password', { 
      method: 'PUT', 
      body: JSON.stringify(body) 
    });
    
    let data;
    try { 
      data = await res.json(); 
    } catch (e) { 
      data = {}; 
    }
    
    if (!res.ok) { 
      msg.textContent = data.error || 'Error al cambiar contraseña'; 
      return; 
    }
    
    msg.style.color = 'green';
    msg.textContent = 'Contraseña actualizada correctamente.';
    document.getElementById('contrasena_actual').value = '';
    document.getElementById('contrasena_nueva').value = '';
    document.getElementById('contrasena_confirm').value = '';
  } catch (err) {
    console.error(err);
    msg.textContent = 'Error de red: ' + err.message;
  }
});

loadProfile();
</script>
<script src="../javascript/nav-loader.js"></script>
</body>
</html>
