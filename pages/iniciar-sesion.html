<!DOCTYPE html>
<html lang="es" class="cuenta-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Systemsware</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="container-seccion">
    <div class="titulo">
      <h1>Systemsware: Sistema de gestión de inventario</h1>
    </div>
    <form class="cuadro-azul" id="loginForm">
      <div class="login-header">
        <h2 class="subtitulo">Bienvenido de vuelta</h2>
        <p class="descripcion">Ingresa tus credenciales para acceder a tu cuenta</p>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="correo"> Correo electrónico</label>
        <input type="email" id="correo" placeholder="correo@ejemplo.com" required autocomplete="email">
        <span class="error" id="error-correo"></span>
      </div>
      
      <div class="barra">
        <label class="etiqueta" for="contrasena"> Contraseña</label>
        <div class="password-input-container">
          <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <span id="eyeIcon">👁️</span>
          </button>
        </div>
        <span class="error" id="error-contrasena"></span>
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe">
          <span class="checkmark"></span>
          Recordarme
        </label>
      </div>
      
      <div id="errorConexion" class="error-conexion" style="display: none;"></div>
      
      <div class="boton-cuenta">
        <button type="submit" id="loginButton">
          <span class="button-text">Iniciar Sesión</span>
          <span class="button-loader" style="display: none;"></span>
        </button>
      </div>
      
      <div class="register-link">
        <p>¿No tienes cuenta? <a href="registrar-cuenta.html" class="olvidar">Regístrate gratis</a></p>
      </div>
    </form>
  </div>

<script>
function togglePassword() {
  const passwordInput = document.getElementById('contrasena');
  const eyeIcon = document.getElementById('eyeIcon');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.textContent = '👁️';
  } else {
    passwordInput.type = 'password';
    eyeIcon.textContent = '👁️‍🗨️';
  }
}

function createErrorElement() {
  let errorDiv = document.getElementById('errorConexion');
  if (!errorDiv) {
    errorDiv = document.createElement('div');
    errorDiv.id = 'errorConexion';
    errorDiv.className = 'error-conexion';
    errorDiv.style.cssText = 'display: none; background: #fee; border: 1px solid #f99; padding: 12px; border-radius: 8px; margin-top: 15px; color: #c00; font-size: 13px; white-space: pre-wrap; line-height: 1.6;';
    document.querySelector('.cuadro-azul').insertBefore(errorDiv, document.querySelector('.boton-cuenta'));
  }
  return errorDiv;
}

function showError(element, mensaje) {
  element.textContent = mensaje;
  element.style.display = 'block';
  element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLoading(loading) {
  const button = document.getElementById('loginButton');
  const buttonText = button.querySelector('.button-text');
  const buttonLoader = button.querySelector('.button-loader');
  
  if (loading) {
    button.disabled = true;
    buttonText.style.display = 'none';
    buttonLoader.style.display = 'inline';
  } else {
    button.disabled = false;
    buttonText.style.display = 'inline';
    buttonLoader.style.display = 'none';
  }
}

document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const correo = document.getElementById("correo").value.trim();
  const contrasena = document.getElementById("contrasena").value.trim();
  const rememberMe = document.getElementById('rememberMe').checked;

  const errorCorreo = document.getElementById("error-correo");
  const errorContrasena = document.getElementById("error-contrasena");

  let valido = true;

  errorCorreo.textContent = "";
  errorContrasena.textContent = "";

  const regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (correo === "") {
    errorCorreo.textContent = "El correo es obligatorio.";
    valido = false;
  } else if (!regexCorreo.test(correo)) {
    errorCorreo.textContent = "Por favor, ingresa un correo válido.";
    valido = false;
  }

  if (contrasena === "") {
    errorContrasena.textContent = "La contraseña es obligatoria.";
    valido = false;
  } else if (contrasena.length < 6) {
    errorContrasena.textContent = "La contraseña debe tener al menos 6 caracteres.";
    valido = false;
  }

  if (valido) {
    setLoading(true);
    const errorElement = document.getElementById('errorConexion');

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ correo, contrasena, rememberMe }),
      timeout: 5000
    })
    .then(r => {
      if (!r.ok) throw new Error(`Servidor respondió con error: ${r.status}`);
      return r.json();
    })
    .then(data => {
      setLoading(false);
      errorElement.style.display = 'none';
      
      console.log('Respuesta del servidor:', data);
      
      if (data.ok) {
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userName', data.user.nombre_usuario);
        localStorage.setItem('loginTime', Date.now().toString());
        
        // Mostrar mensaje de éxito con información de sesiones
        const successDiv = document.createElement('div');
        successDiv.className = 'success-message';
        
        let successMessage = '¡Inicio de sesión exitoso! Redirigiendo...';
        if (data.message) {
          successMessage = data.message + ' Redirigiendo...';
        }
        
        successDiv.textContent = successMessage;
        successDiv.style.cssText = 'background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; white-space: pre-wrap; line-height: 1.6;';
        document.querySelector('.cuadro-azul').insertBefore(successDiv, document.querySelector('.boton-cuenta'));
        
        setTimeout(() => {
          window.location.href = 'inicio.html';
        }, 2000);
      } else {
        // Asegurar que el mensaje de error siempre se muestre
        const errorMessage = data.error || ' Correo o contraseña incorrectos';
        console.log('Mostrando error:', errorMessage);
        
        errorElement.textContent = errorMessage;
        errorElement.style.display = 'block';
        errorElement.style.background = '#fee';
        errorElement.style.border = '1px solid #f99';
        errorElement.style.padding = '12px';
        errorElement.style.borderRadius = '8px';
        errorElement.style.marginTop = '15px';
        errorElement.style.color = '#c00';
        errorElement.style.fontSize = '13px';
        errorElement.style.whiteSpace = 'pre-wrap';
        errorElement.style.lineHeight = '1.6';
        
        errorCorreo.textContent = '';
      } 
    })
    .catch(err => {
      console.error('Error:', err);
      setLoading(false);
      
      let mensaje = ' Error de conexión';
      if (err.message.includes('Failed to fetch')) {
        mensaje = ' No se pudo conectar al servidor. Por favor:\n\n1. Abre una terminal\n2. Ejecuta: npm start\n3. Espera a que el servidor inicie en puerto 3000\n\nLuego intenta nuevamente.';
      } else if (err.message.includes('timeout')) {
        mensaje = ' El servidor tardó demasiado en responder. Intenta nuevamente.';
      } else {
        mensaje = ' Error de red';
      }
      showError(errorElement, mensaje);
      errorCorreo.textContent = '';
    });

  }
});

// Auto-focus en el campo correo al cargar
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('correo').focus();
});
</script>
</body>
</html>
