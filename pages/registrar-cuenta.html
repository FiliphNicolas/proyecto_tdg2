<!DOCTYPE html>
<html lang="es" class="cuenta-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Systemsware</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Servicios de autenticación -->
    <script src="../javascript/password-strength.js"></script>
    <script src="../javascript/auth-service.js"></script>
</head>
<body>
  <div class="container-seccion">
    <div class="titulo">
      <h1>Systemsware: Sistema de gestión de inventario</h1>
    </div>
    <form class="cuadro-azul" id="registroForm">
      <div class="login-header">
        <h2 class="subtitulo">Crear tu cuenta</h2>
        <p class="descripcion">Completa tus datos para unirte a Systemsware</p>
      </div>
      
      <!-- FORMULARIO DE DOS COLUMNAS -->
      <div class="form-columns-container">
        <!-- COLUMNA IZQUIERDA -->
        <div class="form-column">
          <div class="barra">
            <label class="etiqueta" for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Juan Pérez" required autocomplete="name">
            <span class="error" id="error-nombre"></span>
          </div>
          
          <div class="barra">
            <label class="etiqueta" for="numero_cel">Número de celular</label>
            <input type="tel" id="numero_cel" placeholder="3001234567" required autocomplete="tel">
            <span class="error" id="error-numero_cel"></span>
          </div>
          
          <div class="barra">
            <label class="etiqueta" for="rol">Rol en Systemsware</label>
            <select id="rol" required>
              <option value="">-- Selecciona un rol --</option>
              <option value="empleado">Empleado</option>
              <option value="vendedor">Vendedor</option>
              <option value="gerente">Gerente</option>
            </select>
            <span class="error" id="error-rol"></span>
          </div>
        </div>
        
        <!-- COLUMNA DERECHA -->
        <div class="form-column">
          <div class="barra">
            <label class="etiqueta" for="direccion">Dirección</label>
            <input type="text" id="direccion" placeholder="Calle Principal #123" required autocomplete="street-address">
            <span class="error" id="error-direccion"></span>
          </div>
          
          <div class="barra">
            <label class="etiqueta" for="ciudad">Ciudad</label>
            <input type="text" id="ciudad" placeholder="Bogotá" required autocomplete="address-level2">
            <span class="error" id="error-ciudad"></span>
          </div>
          
          <div class="barra">
            <label class="etiqueta" for="sede">Sede</label>
            <select id="sede" required>
              <option value="">-- Cargando sedes... --</option>
            </select>
            <span class="error" id="error-sede"></span>
          </div>
        </div>
      </div>
      
      <!-- CORREO, CONTRASEÑAS (FULL WIDTH) -->
      <div class="form-columns-container">
        <div class="form-full-width">
          <div class="barra">
            <label class="etiqueta" for="correo">Correo electrónico</label>
            <input type="email" id="correo" placeholder="correo@ejemplo.com" required autocomplete="email">
            <span class="error" id="error-correo"></span>
          </div>
        </div>
      </div>
      
      <div class="form-columns-container">
        <div class="form-full-width">
          <div class="barra">
            <label class="etiqueta" for="contrasena">Contraseña</label>
            <div class="password-input-container">
              <input type="password" id="contrasena" placeholder="Crea una contraseña segura" required autocomplete="new-password">
              <button type="button" class="password-toggle" onclick="togglePassword('contrasena')">
                <span id="eyeIcon1">👁️‍🗨️</span>
              </button>
            </div>
            <!-- Indicador de fortaleza de contraseña -->
            <div id="password-strength-container"></div>
            <span class="error" id="error-contrasena"></span>
          </div>
        </div>
      </div>
      
      <div class="form-columns-container">
        <div class="form-full-width">
          <div class="barra">
            <label class="etiqueta" for="contrasena_nuevo">Confirmar contraseña</label>
            <div class="password-input-container">
              <input type="password" id="contrasena_nuevo" placeholder="Repite tu contraseña" required autocomplete="new-password">
              <button type="button" class="password-toggle" onclick="togglePassword('contrasena_nuevo')">
                <span id="eyeIcon2">👁️‍🗨️</span>
              </button>
            </div>
            <span class="error" id="error-contrasena_nuevo"></span>
          </div>
        </div>
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="acceptTerms">
          <span class="checkmark"></span>
          Acepto los términos y condiciones
        </label>
      </div>
      
      <div id="errorConexion" class="error-conexion" style="display: none;"></div>
      
      <div class="boton-cuenta">
        <button type="submit" id="registerButton">
          <span class="button-text">Crear cuenta</span>
          <span class="button-loader" style="display: none;">â³</span>
        </button>
      </div>
      
      <div class="register-link">
        <p>¿Ya tienes cuenta? <a href="iniciar-sesion.html" class="olvidar">Inicia sesión</a></p>
      </div>
    </form>
  </div>

<script>
// Variable global para el indicador de fortaleza
let passwordStrengthIndicator = null;

// Inicializar indicador de fortaleza cuando cargue la página
document.addEventListener('DOMContentLoaded', function() {
  // Inicializar el indicador de fortaleza
  const passwordInput = document.getElementById('contrasena');
  if (passwordInput && typeof PasswordStrengthIndicator !== 'undefined') {
    passwordStrengthIndicator = new PasswordStrengthIndicator(passwordInput, {
      containerClass: 'password-strength-container',
      showRequirements: true
    });
    
    // Ocultar inicialmente los requisitos
    const reqList = document.querySelector('.password-requirements');
    if (reqList) reqList.style.display = 'none';
  }
  
  // Cargar sedes
  cargarSedes();
  
  // Focus en el primer campo
  document.getElementById('nombre').focus();
});

// Cargar sedes al abrir la página
async function cargarSedes() {
  try {
    const response = await fetch('/api/sedes', {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });
    
    if (!response.ok) throw new Error('No se pudieron cargar las sedes');
    
    const data = await response.json();
    const sedeSelect = document.getElementById('sede');
    
    // Limpiar opciones excepto la primera
    sedeSelect.innerHTML = '<option value="">-- Selecciona una sede --</option>';
    
    // Agregar sedes
    if (data.ok && Array.isArray(data.sedes)) {
      data.sedes.forEach(sede => {
        const option = document.createElement('option');
        option.value = sede.id_sede;
        option.textContent = `${sede.nombre} (${sede.ciudad})`;
        sedeSelect.appendChild(option);
      });
    } else {
      throw new Error('Formato de respuesta inválido');
    }
  } catch (err) {
    console.error('Error cargando sedes:', err);
    const sedeSelect = document.getElementById('sede');
    sedeSelect.innerHTML = '<option value="">Error al cargar sedes</option>';
  }
}

function togglePassword(fieldId) {
  const passwordInput = document.getElementById(fieldId);
  const eyeIcon = document.getElementById(fieldId === 'contrasena' ? 'eyeIcon1' : 'eyeIcon2');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.textContent = '👁️';
  } else {
    passwordInput.type = 'password';
    eyeIcon.textContent = '👁️‍🗨️';
  }
}

function createErrorElement() {
  let errorDiv = document.getElementById('errorConexion');
  if (!errorDiv) {
    errorDiv = document.createElement('div');
    errorDiv.id = 'errorConexion';
    errorDiv.className = 'error-conexion';
    errorDiv.style.cssText = 'display: none; background: #fee; border: 1px solid #f99; padding: 12px; border-radius: 8px; margin-top: 15px; color: #c00; font-size: 13px; white-space: pre-wrap; line-height: 1.6;';
    document.querySelector('.cuadro-azul').insertBefore(errorDiv, document.querySelector('.boton-cuenta'));
  }
  return errorDiv;
}

function showError(element, mensaje) {
  element.textContent = mensaje;
  element.style.display = 'block';
  element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLoading(loading) {
  const button = document.getElementById('registerButton');
  const buttonText = button.querySelector('.button-text');
  const buttonLoader = button.querySelector('.button-loader');
  
  if (loading) {
    button.disabled = true;
    buttonText.style.display = 'none';
    buttonLoader.style.display = 'inline';
  } else {
    button.disabled = false;
    buttonText.style.display = 'inline';
    buttonLoader.style.display = 'none';
  }
}

document.getElementById("registroForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const nombre            = document.getElementById("nombre").value.trim();
  const correo            = document.getElementById("correo").value.trim();
  const direccion         = document.getElementById("direccion").value.trim();
  const numero_cel        = document.getElementById("numero_cel").value.trim();
  const ciudad            = document.getElementById("ciudad").value.trim();
  const rol               = document.getElementById("rol").value.trim();
  const sede              = document.getElementById("sede").value.trim();
  const contrasena        = document.getElementById("contrasena").value.trim();
  const contrasena_nuevo  = document.getElementById("contrasena_nuevo").value.trim();
  const acceptTerms       = document.getElementById('acceptTerms').checked;

  const errores = {
    nombre:                document.getElementById("error-nombre"),
    correo:                document.getElementById("error-correo"),
    direccion:             document.getElementById("error-direccion"),
    numero_cel:            document.getElementById("error-numero_cel"),
    ciudad:                document.getElementById("error-ciudad"),
    rol:                   document.getElementById("error-rol"),
    sede:                  document.getElementById("error-sede"),
    contrasena:            document.getElementById("error-contrasena"),
    contrasena_nuevo:      document.getElementById("error-contrasena_nuevo")
  };

  // Limpiar errores
  Object.values(errores).forEach(e => e.textContent = "");

  let valido = true;

  // Validar términos y condiciones
  if (!acceptTerms) {
    showError(document.getElementById('errorConexion'), 'Debes aceptar los términos y condiciones para continuar.');
    valido = false;
  }

  // Nombre
  if (nombre === "") {
    errores.nombre.textContent = "El nombre es obligatorio.";
    valido = false;
  } else if (nombre.length < 3) {
    errores.nombre.textContent = "El nombre debe tener al menos 3 caracteres.";
    valido = false;
  } else if (!/^[a-zA-Z\s]+$/.test(nombre)) {
    errores.nombre.textContent = "El nombre solo puede contener letras y espacios.";
    valido = false;
  }

  // Correo
  const regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (correo === "") {
    errores.correo.textContent = "El correo es obligatorio.";
    valido = false;
  } else if (!regexCorreo.test(correo)) {
    errores.correo.textContent = "Por favor, ingresa un correo válido.";
    valido = false;
  }

  // Dirección
  if (direccion === "") {
    errores.direccion.textContent = "La dirección es obligatoria.";
    valido = false;
  } else if (direccion.length < 5) {
    errores.direccion.textContent = "La dirección debe tener al menos 5 caracteres.";
    valido = false;
  }

  // Número celular
  const regexCel = /^\d{7,10}$/;
  if (numero_cel === "") {
    errores.numero_cel.textContent = "El número es obligatorio.";
    valido = false;
  } else if (!regexCel.test(numero_cel)) {
    errores.numero_cel.textContent = "Debe tener entre 7 y 10 dígitos.";
    valido = false;
  }

  // Ciudad
  if (ciudad === "") {
    errores.ciudad.textContent = "La ciudad es obligatoria.";
    valido = false;
  } else if (!/^[a-zA-Z\s]+$/.test(ciudad)) {
    errores.ciudad.textContent = "La ciudad solo puede contener letras y espacios.";
    valido = false;
  }

  // Rol
  if (rol === "") {
    errores.rol.textContent = "Debes seleccionar un rol.";
    valido = false;
  } else if (!['empleado', 'vendedor', 'gerente'].includes(rol)) {
    errores.rol.textContent = "El rol seleccionado no es válido.";
    valido = false;
  }

  // Sede
  if (sede === "") {
    errores.sede.textContent = "Debes seleccionar una sede.";
    valido = false;
  } else if (isNaN(parseInt(sede))) {
    errores.sede.textContent = "La sede seleccionada no es válida.";
    valido = false;
  }

  // Contraseña - Usar validación del indicador de fortaleza
  if (contrasena === "") {
    errores.contrasena.textContent = "La contraseña es obligatoria.";
    valido = false;
  } else if (passwordStrengthIndicator && !passwordStrengthIndicator.isValid()) {
    errores.contrasena.textContent = "La contraseña no cumple con los requisitos de seguridad.";
    valido = false;
    // Mostrar los requisitos para ayudar al usuario
    const reqList = document.querySelector('.password-requirements');
    if (reqList) reqList.style.display = 'block';
  }

  // Confirmar contraseña
  if (contrasena_nuevo === "") {
    errores.contrasena_nuevo.textContent = "Debes repetir la contraseña.";
    valido = false;
  } else if (contrasena !== contrasena_nuevo) {
    errores.contrasena_nuevo.textContent = "Las contraseñas no coinciden.";
    valido = false;
  }

  if (valido) {
    setLoading(true);
    const errorElement = document.getElementById('errorConexion');

    // Usar el AuthService para registro profesional
    authService.register({
      nombre: nombre,
      correo: correo,
      contrasena: contrasena,
      direccion: direccion,
      numero_cel: numero_cel,
      ciudad: ciudad,
      rol: rol,
      id_sede: parseInt(sede)
    })
    .then(data => {
      setLoading(false);
      errorElement.style.display = 'none';
      
      // Limpiar mensajes anteriores
      const existingMessages = document.querySelectorAll('.success-message, .error-conexion');
      existingMessages.forEach(msg => msg.remove());
      
      // Mostrar mensaje de éxito
      const successDiv = document.createElement('div');
      successDiv.className = 'success-message';
      successDiv.textContent = '¡Cuenta creada exitosamente! Redirigiendo...';
      successDiv.style.cssText = 'background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center;';
      document.querySelector('.cuadro-azul').insertBefore(successDiv, document.querySelector('.boton-cuenta'));
      
      successDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);
    })
    .catch(err => {
      console.error('Error de registro:', err);
      setLoading(false);
      
      // Limpiar mensajes anteriores
      const existingMessages = document.querySelectorAll('.success-message, .error-conexion');
      existingMessages.forEach(msg => msg.remove());
      
      // Construir mensaje de error
      let mensaje = err.message || 'Error al registrar la cuenta';
      
      // Mensajes amigables para códigos de error conocidos
      const errorMessages = {
        'EMAIL_EXISTS': 'Este correo ya está registrado. Usa otro correo o inicia sesión.',
        'WEAK_PASSWORD': 'La contraseña no es suficientemente segura. Sigue los requisitos indicados.',
        'MISSING_FIELDS': 'Faltan campos obligatorios. Completa todos los campos.',
        'INVALID_SEDE': 'La sede seleccionada no es válida.',
        'SERVER_ERROR': 'Error del servidor. Intenta nuevamente en unos momentos.',
        'NETWORK_ERROR': 'Error de conexión. Verifica tu internet e intenta nuevamente.',
        'RATE_LIMITED': 'Demasiados intentos. Espera un momento antes de intentar nuevamente.'
      };
      
      if (err.code && errorMessages[err.code]) {
        mensaje = errorMessages[err.code];
      }
      
      // Mostrar error
      errorElement.textContent = mensaje;
      errorElement.style.display = 'block';
      errorElement.style.cssText = 'display: block; background: #fee; border: 1px solid #f99; padding: 12px; border-radius: 8px; margin: 15px 0; color: #c00; font-size: 14px; font-weight: 500; text-align: center;';
      
      errorElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
});

</script>
</body>
</html>
